name: Deploy to Xserver (FTP)

# main に push されると、自動でビルドしてエックスサーバーへFTP転送します。
# 手動実行したいときは Actions タブの「Run workflow」からも実行できます。
on:
  push:
    branches:
      - main
  workflow_dispatch:

# 同時に複数走らないように（連続pushでも最後の1回だけ反映）
concurrency:
  group: deploy-xserver
  cancel-in-progress: true

jobs:
  build-and-deploy:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1

      - uses: pnpm/action-setup@v3
        with:
          version: 9.1.0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 通常ビルド = site が https://taikisato.com 向けの dist/ を生成
      - name: Build with Astro
        run: pnpm run build

      # dist/ の中身をエックスサーバーへFTPS転送（差分のみ送るので高速）
      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # 転送対象から除外（不要ファイルをサーバーに上げない）
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
