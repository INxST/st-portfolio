name: Deploy to Xserver (FTP)

# main に push されると、自動でビルドしてエックスサーバーへFTP転送します。
# 手動実行したいときは Actions タブの「Run workflow」からも実行できます。
on:
  push:
    branches:
      - main
  workflow_dispatch:

# 同時に複数走らないように（連続pushでも最後の1回だけ反映）
concurrency:
  group: deploy-xserver
  cancel-in-progress: true

jobs:
  build-and-deploy:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1

      - uses: pnpm/action-setup@v3
        with:
          version: 9.1.0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 通常ビルド = site が https://taikisato.com 向けの dist/ を生成
      - name: Build with Astro
        run: pnpm run build

      # lftp で dist/ をエックスサーバーへ FTPS 転送（差分のみ・信頼性高）
      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTPS (lftp)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp -c "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate false;
            set net:timeout 30;
            set net:max-retries 3;
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" \"$FTP_SERVER\";
            cd \"$FTP_SERVER_DIR\";
            mirror --reverse --delete --verbose --exclude='.git' --exclude='.DS_Store' ./dist/ ./;
            bye
          "
