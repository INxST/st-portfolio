name: Deploy to Xserver (FTP)

# main に push されると、自動でビルドしてエックスサーバーへFTP転送します。
# 手動実行したいときは Actions タブの「Run workflow」からも実行できます。
on:
  push:
    branches:
      - main
  workflow_dispatch:

# 同時に複数走らないように（連続pushでも最後の1回だけ反映）
concurrency:
  group: deploy-xserver
  cancel-in-progress: true

jobs:
  build-and-deploy:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1

      - uses: pnpm/action-setup@v3
        with:
          version: 9.1.0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 通常ビルド = site が https://taikisato.com 向けの dist/ を生成
      - name: Build with Astro
        run: pnpm run build

      # SSH鍵を配置
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/xserver_deploy
          chmod 600 ~/.ssh/xserver_deploy
          ssh-keyscan -p 10022 ${{ secrets.FTP_SERVER }} >> ~/.ssh/known_hosts 2>/dev/null

      # rsync over SFTP でエックスサーバーへ転送（差分のみ・高速・確実）
      - name: Deploy via SFTP (rsync)
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.DS_Store' \
            --exclude='.htaccess' \
            --exclude='.user.ini' \
            -e "ssh -i ~/.ssh/xserver_deploy -p 10022 -o StrictHostKeyChecking=no" \
            ./dist/ \
            ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:${{ secrets.FTP_SERVER_DIR }}
